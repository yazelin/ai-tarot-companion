<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <title>AI 塔羅心靈陪伴站</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span id="aiStatus" class="brand-status checking" role="button" tabindex="0" title="AI 連線狀態（點擊重新檢查）">
        <span class="dot"></span>
        <span class="label" hidden>檢查中</span>
      </span>
      <h1>AI 塔羅心靈陪伴站</h1>
    </div>
    <div class="topbar-actions">
      <button id="voiceToggle" class="icon-btn" aria-pressed="true" title="開關語音朗讀">
        <span class="icon">🔊</span>
        <span class="label">語音開</span>
      </button>
      <button id="fontToggle" class="icon-btn" title="調整字體大小">
        <span class="icon">🔠</span>
        <span class="label">字體</span>
      </button>
    </div>
  </header>

  <main id="app">
    <!-- 首頁 -->
    <section class="screen active" data-screen="home">
      <p class="greeting" id="greeting">您好！今天想做什麼呢？</p>
      <div class="menu-grid">
        <button class="menu-card" data-go="tarot">
          <span class="menu-emoji">🔮</span>
          <span class="menu-title">抽一張牌</span>
          <span class="menu-sub">看看今天的小提醒</span>
        </button>
        <button class="menu-card" data-go="chat">
          <span class="menu-emoji">💬</span>
          <span class="menu-title">聊聊天</span>
          <span class="menu-sub">想說什麼都可以</span>
        </button>
        <button class="menu-card" data-go="task">
          <span class="menu-emoji">✅</span>
          <span class="menu-title">今日任務</span>
          <span class="menu-sub">一起做件小事</span>
        </button>
        <button class="menu-card" data-go="wish">
          <span class="menu-emoji">💝</span>
          <span class="menu-title">祝福牆</span>
          <span class="menu-sub">寫下你的心願</span>
        </button>
      </div>
    </section>

    <!-- 塔羅抽牌 -->
    <section class="screen" data-screen="tarot">
      <button class="back-btn" data-back>← 回到主畫面</button>
      <h2 class="screen-title">今天想問什麼呢？</h2>
      <div id="tarotStage" class="tarot-stage">
        <div class="card-back" id="cardBack">
          <div class="card-back-pattern">✨ 🌙 ✨</div>
        </div>
        <button id="drawBtn" class="big-btn primary">
          <span class="emoji">🎴</span> 抽一張牌
        </button>
      </div>
      <div id="tarotResult" class="tarot-result hidden" aria-live="polite">
        <div class="card-front" id="cardFront">
          <div class="card-image" id="cardImage">⭐</div>
          <div class="card-name" id="cardName">星星 The Star</div>
        </div>
        <div class="card-reading">
          <p class="reading-headline" id="readingHeadline">別擔心，美好的事情正在靠近你！</p>
          <p class="reading-body" id="readingBody"></p>
        </div>
        <div class="card-actions">
          <button class="big-btn" id="readAloudBtn">🔊 再聽一次</button>
          <button class="big-btn" id="makeTaskBtn">✅ 變成今天的小任務</button>
          <button class="big-btn" id="drawAgainBtn">🔄 再抽一張</button>
        </div>
      </div>
    </section>

    <!-- 聊聊天 -->
    <section class="screen" data-screen="chat">
      <button class="back-btn" data-back>← 回到主畫面</button>
      <h2 class="screen-title">和亞澤聊聊</h2>
      <div id="chatLog" class="chat-log" aria-live="polite"></div>
      <div class="mood-grid" id="moodGrid">
        <button class="mood-btn" data-mood="開心">😊 我很開心</button>
        <button class="mood-btn" data-mood="想念">🥺 有點想念</button>
        <button class="mood-btn" data-mood="孤單">😔 覺得孤單</button>
        <button class="mood-btn" data-mood="不舒服">🤒 身體不舒服</button>
        <button class="mood-btn" data-mood="煩惱">😟 心裡煩煩的</button>
        <button class="mood-btn" data-mood="感謝">🙏 想說謝謝</button>
        <button class="mood-btn" data-mood="無聊">🥱 有點無聊</button>
        <button class="mood-btn" data-mood="平靜">😌 還算平靜</button>
      </div>
      <div class="chat-input-row">
        <button id="micBtn" class="big-btn ghost" title="點一下開始錄音">
          <span class="emoji">🎤</span><span class="btn-text"> 按一下說話</span>
        </button>
        <input id="chatText" class="chat-text" placeholder="或在這裡打字…" />
        <button id="chatSendBtn" class="big-btn primary">送出</button>
      </div>
    </section>

    <!-- 今日任務 -->
    <section class="screen" data-screen="task">
      <button class="back-btn" data-back>← 回到主畫面</button>
      <h2 class="screen-title">今天的小任務</h2>
      <div id="taskList" class="task-list"></div>
      <button id="newTaskBtn" class="big-btn primary">🎲 換一個任務</button>
    </section>

    <!-- 祝福牆 -->
    <section class="screen" data-screen="wish">
      <button class="back-btn" data-back>← 回到主畫面</button>
      <h2 class="screen-title">心願祝福牆</h2>
      <div class="wish-compose">
        <input id="wishName" class="chat-text" placeholder="您的稱呼（例如：阿嬤）" maxlength="10" />
        <textarea id="wishText" class="wish-text" placeholder="寫下您的心願或祝福…" maxlength="80"></textarea>
        <button id="wishSubmit" class="big-btn primary">💝 貼上去</button>
      </div>
      <div id="wishWall" class="wish-wall"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="scripts/config.js"></script>
  <script src="data/tarot.js"></script>
  <script src="data/responses.js"></script>
  <script src="scripts/voice.js"></script>
  <script src="scripts/ai.js"></script>
  <script src="scripts/app.js"></script>
</body>
</html>
